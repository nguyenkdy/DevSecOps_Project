services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Tạo sẵn DB cho từng service. Mỗi service 1 database riêng (microservices pattern)
      POSTGRES_MULTIPLE_DATABASES: user_db,product_db,order_db,payment_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # LocalStack — giả lập S3, SQS, SNS, SES tại local (thay cho AWS thật)
  localstack:
    image: localstack/localstack:3.0
    container_name: ecom-localstack
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3,sqs,sns,ses
      DEBUG: 0
      AWS_DEFAULT_REGION: ap-southeast-1
    volumes:
      - ./infra/docker/init-localstack.sh:/etc/localstack/init/ready.d/init.sh

  user-service:
    build:
      context: ./services/user-service
      target: build
    container_name: ecom-user-service
    command: npm run start:dev
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_NAME: user_db
      REDIS_HOST: redis
      AWS_ENDPOINT: http://localstack:4566
      SNS_USER_TOPIC_ARN: arn:aws:sns:ap-southeast-1:000000000000:user-events
    volumes:
      - ./services/user-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started

  product-service:
    build:
      context: ./services/product-service
      target: build
    container_name: ecom-product-service
    command: npm run start:dev
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_NAME: product_db
      AWS_ENDPOINT: http://localstack:4566
      S3_MEDIA_BUCKET: ecom-media-dev
      JWT_ACCESS_SECRET: dev_access_secret
    volumes:
      - ./services/product-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  order-service:
    build:
      context: ./services/order-service
      target: build
    container_name: ecom-order-service
    command: npm run start:dev
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_NAME: order_db
      REDIS_HOST: redis
      AWS_ENDPOINT: http://localhost:4566
      SQS_QUEUE_URL: http://localhost:4566/000000000000/order-created
      JWT_ACCESS_SECRET: dev_access_secret
      PRODUCT_SERVICE_URL: http://product-service:3002
    volumes:
      - ./services/order-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
      product-service:
        condition: service_started

  # Các service còn lại — bỏ comment khi đã code xong
  # payment-service:  (port 3004)
  # api-gateway:      (port 3000)
  # frontend:         (port 3005)

volumes:
  pgdata:
